openapi: 3.0.3
info:
  title: NavDhan Apply API
  description: |
    Consent-based multi-step loan application wizard for the redesigned NavDhan platform.
    All monetary amounts are expressed as whole Indian Rupees (INR) integers to avoid
    floating-point representation. Every mutation requires an `Idempotency-Key` header
    and a CSRF marker header.
  version: "1.0.0"
  contact:
    name: Kubar Labs Engineering
servers:
  - url: /api
    description: NavDhan production API

tags:
  - name: Apply
    description: Loan application wizard lifecycle
  - name: Consent
    description: Explicit consent capture and audit
  - name: Documents
    description: ITR and TDS certificate upload

components:
  parameters:
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      description: UUID v4 used to deduplicate mutating requests for 10 minutes.
      schema:
        type: string
        format: uuid
        example: "11111111-1111-1111-1111-111111111111"
    CsrfHeader:
      name: x-navdhan-requested-with
      in: header
      required: true
      description: CSRF marker required on all mutating requests.
      schema:
        type: string
        enum: [apply]
        example: apply
    LocaleHeader:
      name: Accept-Language
      in: header
      required: false
      description: BCP-47 locale for user-facing copy.
      schema:
        type: string
        enum: [en, hi, bn, te, mr, ta, kn, ml]
        default: en
        example: en

  schemas:
    ApplicationStep:
      type: string
      enum:
        - basic_details
        - ekyc_consent
        - ekyc_verification
        - pan_consent
        - pan_verification
        - gstin_consent
        - gstin_verification
        - gstin_returns
        - bank_statement_consent
        - bank_statement_analysis
        - itr_upload
        - tds_upload
        - review_submit
        - submission_result
      example: ekyc_consent

    ApplicationStatus:
      type: string
      enum: [draft, submitted, declined, expired]
      example: draft

    LoanPurpose:
      type: string
      enum:
        - working_capital
        - machinery
        - inventory
        - business_expansion
        - debt_refinancing
        - other
      example: working_capital

    DocumentType:
      type: string
      enum: [itr, tds_certificate]
      example: itr

    LinkStatus:
      type: string
      enum: [linked, not_linked, unknown]
      example: linked

    ConsentReceipt:
      type: object
      required: [accepted, statement_snapshot, version, locale]
      properties:
        accepted:
          type: boolean
          description: Affirmative opt-in from the borrower.
        statement_snapshot:
          type: string
          maxLength: 2000
          description: Exact user-facing consent text shown at the time of acceptance.
        version:
          type: string
          description: Stable consent statement version.
        locale:
          type: string
          enum: [en, hi, bn, te, mr, ta, kn, ml]
          description: Locale in which the consent statement was presented.
        data_points:
          type: array
          items:
            type: string
          description: Human-readable list of data items being collected.
        purpose:
          type: string
          description: Human-readable purpose of data collection.
        accessors:
          type: array
          items:
            type: string
          description: Human-readable list of parties who will access the data.

    FinalConsents:
      type: object
      required: [terms, privacy, credit_bureau]
      properties:
        terms:
          type: boolean
        privacy:
          type: boolean
        credit_bureau:
          type: boolean
        marketing:
          type: boolean

    ApplicationState:
      type: object
      required: [application_id, borrower_id, current_step, status]
      properties:
        application_id:
          type: string
          format: uuid
        borrower_id:
          type: string
          format: uuid
        current_step:
          $ref: "#/components/schemas/ApplicationStep"
        status:
          $ref: "#/components/schemas/ApplicationStatus"
        requested_amount:
          type: integer
          description: Requested amount in whole INR.
        purpose:
          $ref: "#/components/schemas/LoanPurpose"
        referral_code:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          description: Draft expiry timestamp.

    OtpReference:
      type: object
      required: [otp_reference_id, expires_at, cooldown_seconds]
      properties:
        otp_reference_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        cooldown_seconds:
          type: integer
          minimum: 0

    EkycVerifyResponse:
      type: object
      required: [application_id, verified, current_step, status]
      properties:
        application_id:
          type: string
          format: uuid
        verified:
          type: boolean
        masked_name:
          type: string
          nullable: true
        current_step:
          $ref: "#/components/schemas/ApplicationStep"
        status:
          $ref: "#/components/schemas/ApplicationStatus"

    PanVerifyResponse:
      type: object
      required: [application_id, verified, link_status, current_step, status]
      properties:
        application_id:
          type: string
          format: uuid
        verified:
          type: boolean
        link_status:
          $ref: "#/components/schemas/LinkStatus"
        name_match:
          type: boolean
          nullable: true
        pan_masked:
          type: string
          example: "ABCXX***X"
        current_step:
          $ref: "#/components/schemas/ApplicationStep"
        status:
          $ref: "#/components/schemas/ApplicationStatus"

    GstReturnPeriod:
      type: object
      required: [period, filing_status]
      properties:
        period:
          type: string
          example: "2024-Q1"
        filing_status:
          type: string
          enum: [filed, pending, not_applicable]
        taxable_value:
          type: integer
          nullable: true
          description: Taxable value in whole INR.
        tax_paid:
          type: integer
          nullable: true
          description: Tax paid in whole INR.

    GstinVerifyResponse:
      type: object
      required: [application_id, valid, current_step, status]
      properties:
        application_id:
          type: string
          format: uuid
        valid:
          type: boolean
        legal_name:
          type: string
          nullable: true
        current_step:
          $ref: "#/components/schemas/ApplicationStep"
        status:
          $ref: "#/components/schemas/ApplicationStatus"

    GstinReturnsResponse:
      type: object
      required: [application_id, gstin, return_history, current_step, status]
      properties:
        application_id:
          type: string
          format: uuid
        gstin:
          type: string
        return_history:
          type: array
          items:
            $ref: "#/components/schemas/GstReturnPeriod"
        current_step:
          $ref: "#/components/schemas/ApplicationStep"
        status:
          $ref: "#/components/schemas/ApplicationStatus"

    BankStatementAnalyzeResponse:
      type: object
      required: [application_id, perfios_transaction_id, status, current_step]
      properties:
        application_id:
          type: string
          format: uuid
        perfios_transaction_id:
          type: string
        redirect_url:
          type: string
          format: uri
          nullable: true
          description: Perfios widget/net-banking redirect URL when net-banking flow is used.
        status:
          type: string
          enum: [pending, success, failure, partial]
        analysis_score:
          type: number
          nullable: true
          description: Normalized 0-100 bank-statement analysis score.
        current_step:
          $ref: "#/components/schemas/ApplicationStep"

    Document:
      type: object
      required: [document_id, document_type, file_name, status, uploaded_at]
      properties:
        document_id:
          type: string
          format: uuid
        document_type:
          $ref: "#/components/schemas/DocumentType"
        file_name:
          type: string
        mime_type:
          type: string
          example: application/pdf
        file_size_bytes:
          type: integer
        status:
          type: string
          enum: [pending, uploaded, scanned, failed]
        uploaded_at:
          type: string
          format: date-time

    SubmissionResult:
      type: object
      required: [application_id, outcome, status]
      properties:
        application_id:
          type: string
          format: uuid
        outcome:
          type: string
          enum: [submitted_success, submission_failed]
        reference_number:
          type: string
          nullable: true
          example: "NDH-YYYYMMDD-XXXXXX"
        next_step:
          type: string
          nullable: true
          example: offers
        support_reference:
          type: string
          nullable: true
        support_path:
          type: string
          enum: [email, phone, chat_stub]
          nullable: true
        status:
          $ref: "#/components/schemas/ApplicationStatus"

    ConsentRecord:
      type: object
      required: [consent_id, application_id, step_id, consent_key, accepted, recorded_at]
      properties:
        consent_id:
          type: string
          format: uuid
        application_id:
          type: string
          format: uuid
        step_id:
          type: string
        consent_key:
          type: string
        accepted:
          type: boolean
        statement_snapshot:
          type: string
        recorded_at:
          type: string
          format: date-time

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Machine-readable error code.
        detail:
          type: string
          nullable: true
          description: Human-readable detail, safe for display.
        message_i18n_key:
          type: string
          nullable: true
        field_errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
          nullable: true
        retry_after_seconds:
          type: integer
          nullable: true
        missing_consents:
          type: array
          items:
            type: string
          nullable: true

  responses:
    ValidationError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: VALIDATION_ERROR
            detail: One or more fields are invalid.
            field_errors:
              - field: requested_amount
                message: Must be between INR 500000 and INR 10000000.
    UnauthorizedError:
      description: Session cookie missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: SESSION_INVALID
            message_i18n_key: apply.errors.sessionExpired
    ForbiddenError:
      description: CSRF header missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: CSRF_INVALID
    NotFoundError:
      description: Application or resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: APPLICATION_NOT_FOUND
    ConflictError:
      description: Invalid state transition or idempotency key conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            InvalidTransition:
              value:
                error: INVALID_TRANSITION
                current_step: ekyc_consent
                expected_step: basic_details
            IdempotencyConflict:
              value:
                error: IDEMPOTENCY_KEY_CONFLICT
                detail: Idempotency key reused with a different payload.
    RateLimitError:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: RATE_LIMITED
            retry_after_seconds: 60
    FileTooLargeError:
      description: Uploaded file exceeds the 5 MB limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: FILE_TOO_LARGE
            max_size_bytes: 5242880
    UnsupportedMediaError:
      description: Uploaded file type is not supported.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: UNSUPPORTED_MEDIA_TYPE
    IncompleteApplicationError:
      description: Application data is incomplete for final submission.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: INCOMPLETE_APPLICATION
            missing_steps: [pan_verification]
    ServerError:
      description: Internal server error or submission failure.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: SUBMISSION_FAILED
            support_reference: REQ-12345
            support_path: email

  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: __Host-nd_session
      description: HTTP-only session cookie.

security:
  - SessionCookie: []

paths:
  /apply/initialize:
    post:
      operationId: initializeApplication
      summary: Create a new loan application session.
      tags: [Apply]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name, email, phone, requested_amount, purpose]
              properties:
                full_name:
                  type: string
                  minLength: 2
                  maxLength: 150
                email:
                  type: string
                  format: email
                  maxLength: 255
                phone:
                  type: string
                  pattern: "^[6-9]\\d{9}$"
                  description: 10-digit Indian mobile number.
                requested_amount:
                  type: integer
                  minimum: 500000
                  maximum: 10000000
                  multipleOf: 10000
                  description: Requested loan amount in whole INR.
                purpose:
                  $ref: "#/components/schemas/LoanPurpose"
                referral_code:
                  type: string
                  maxLength: 20
                  pattern: "^[A-Za-z0-9_-]+$"
                  nullable: true
      responses:
        "200":
          description: Application initialized and advanced to the first consent step.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationState"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/state:
    get:
      operationId: getApplicationState
      summary: Retrieve the current application state and step.
      tags: [Apply]
      parameters:
        - $ref: "#/components/parameters/LocaleHeader"
      responses:
        "200":
          description: Current application state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationState"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/ekyc/send-otp:
    post:
      operationId: sendEkycOtp
      summary: Request an OTP for Aadhaar eKYC after explicit consent.
      tags: [Apply]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [application_id, aadhaar_number, consent]
              properties:
                application_id:
                  type: string
                  format: uuid
                aadhaar_number:
                  type: string
                  pattern: "^\\d{12}$"
                  description: 12-digit Aadhaar number.
                consent:
                  $ref: "#/components/schemas/ConsentReceipt"
      responses:
        "200":
          description: OTP reference returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpReference"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/ekyc/verify:
    post:
      operationId: verifyEkycOtp
      summary: Verify the Aadhaar eKYC OTP.
      tags: [Apply]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [application_id, otp_reference_id, otp]
              properties:
                application_id:
                  type: string
                  format: uuid
                otp_reference_id:
                  type: string
                  format: uuid
                otp:
                  type: string
                  pattern: "^\\d{6}$"
      responses:
        "200":
          description: OTP verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EkycVerifyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "410":
          description: OTP has expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: OTP_EXPIRED
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/pan/verify:
    post:
      operationId: verifyPan
      summary: Verify PAN and PAN-Aadhaar link status after explicit consent.
      tags: [Apply]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [application_id, pan_number, consent]
              properties:
                application_id:
                  type: string
                  format: uuid
                pan_number:
                  type: string
                  pattern: "^[A-Z]{5}[0-9]{4}[A-Z]$"
                  description: 10-character PAN.
                consent:
                  $ref: "#/components/schemas/ConsentReceipt"
      responses:
        "200":
          description: PAN verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PanVerifyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/gstin/verify:
    post:
      operationId: verifyGstin
      summary: Validate GSTIN after explicit consent.
      tags: [Apply]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [application_id, gstin, consent]
              properties:
                application_id:
                  type: string
                  format: uuid
                gstin:
                  type: string
                  pattern: "^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][1-9A-Z]Z[0-9A-Z]$"
                  description: 15-character GSTIN.
                consent:
                  $ref: "#/components/schemas/ConsentReceipt"
      responses:
        "200":
          description: GSTIN verification result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GstinVerifyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/gstin/fetch-returns:
    post:
      operationId: fetchGstinReturns
      summary: Fetch GST return history after explicit consent.
      tags: [Apply]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [application_id, gstin, consent]
              properties:
                application_id:
                  type: string
                  format: uuid
                gstin:
                  type: string
                consent:
                  $ref: "#/components/schemas/ConsentReceipt"
      responses:
        "200":
          description: GST return history retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GstinReturnsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          description: Third-party GST service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: GST_SERVICE_UNAVAILABLE
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/bank-statement/analyze:
    post:
      operationId: analyzeBankStatement
      summary: Initiate Perfios bank statement analysis after explicit consent.
      tags: [Apply]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [application_id, months, consent]
              properties:
                application_id:
                  type: string
                  format: uuid
                bank_name:
                  type: string
                  maxLength: 100
                  nullable: true
                months:
                  type: integer
                  minimum: 6
                  maximum: 12
                method:
                  type: string
                  enum: [netbanking, upload]
                  nullable: true
                consent:
                  $ref: "#/components/schemas/ConsentReceipt"
      responses:
        "200":
          description: Bank statement analysis initiated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankStatementAnalyzeResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "424":
          description: Perfios service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: PERFIOS_UNAVAILABLE
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/documents/upload:
    post:
      operationId: uploadDocument
      summary: Upload ITR or Form 26AS (TDS certificate).
      tags: [Documents]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [application_id, document_type, file]
              properties:
                application_id:
                  type: string
                  format: uuid
                document_type:
                  $ref: "#/components/schemas/DocumentType"
                file:
                  type: string
                  format: binary
                  description: PDF up to 5 MB.
            encoding:
              file:
                contentType: application/pdf
      responses:
        "201":
          description: Document uploaded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "413":
          $ref: "#/components/responses/FileTooLargeError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/submit:
    post:
      operationId: submitApplication
      summary: Final submission and complete data verification.
      tags: [Apply]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [application_id, final_consents]
              properties:
                application_id:
                  type: string
                  format: uuid
                final_consents:
                  $ref: "#/components/schemas/FinalConsents"
      responses:
        "200":
          description: Submission result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmissionResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "422":
          $ref: "#/components/responses/IncompleteApplicationError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"

  /apply/consent:
    post:
      operationId: recordConsent
      summary: Record an explicit consent decision for audit.
      tags: [Consent]
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/CsrfHeader"
        - $ref: "#/components/parameters/LocaleHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [application_id, step_id, consent_key, accepted, statement_snapshot]
              properties:
                application_id:
                  type: string
                  format: uuid
                step_id:
                  type: string
                  enum:
                    - ekyc_consent
                    - pan_consent
                    - gstin_consent
                    - bank_statement_consent
                    - review_submit
                consent_key:
                  type: string
                accepted:
                  type: boolean
                statement_snapshot:
                  type: string
                  maxLength: 2000
                locale:
                  type: string
                  enum: [en, hi, bn, te, mr, ta, kn, ml]
                  default: en
      responses:
        "201":
          description: Consent recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentRecord"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"
