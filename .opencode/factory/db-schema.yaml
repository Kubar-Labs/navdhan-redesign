version: "1.0.0"
description: |
  Relational schema for the redesigned NavDhan `/apply` multi-step loan application
  wizard. PII (phone, PAN, Aadhaar, name) is encrypted at rest by the service layer;
  only one-way hashes and masked display values are persisted. All monetary amounts
  use DECIMAL(19,4). Foreign keys specify `on_delete` behaviour.

enums:
  application_status:
    - draft
    - submitted
    - declined
    - expired
  application_step:
    - basic_details
    - ekyc_consent
    - ekyc_verification
    - pan_consent
    - pan_verification
    - gstin_consent
    - gstin_verification
    - gstin_returns
    - bank_statement_consent
    - bank_statement_analysis
    - itr_upload
    - tds_upload
    - review_submit
    - submission_result
  loan_purpose:
    - working_capital
    - machinery
    - inventory
    - business_expansion
    - debt_refinancing
    - other
  document_type:
    - itr
    - tds_certificate
  document_status:
    - pending
    - uploaded
    - scanned
    - failed
  scan_result:
    - clean
    - infected
    - unreadable
  verification_status:
    - pending
    - verified
    - failed
  bank_statement_status:
    - pending
    - success
    - failure
    - partial
  link_status:
    - linked
    - not_linked
    - unknown

tables:
  borrowers:
    description: |
      Borrower identity. The requested attributes (`phone`, `pan`) are stored as
      encrypted values plus hashes/masks; full plaintext never persists.
    columns:
      id:
        type: uuid
        primary: true
        default: gen_random_uuid()
      email:
        type: varchar(255)
        nullable: false
        unique: true
      full_name:
        type: text
        nullable: true
        description: PII — encrypted at rest.
      phone_hash:
        type: varchar(64)
        nullable: true
        description: SHA-256 of the 10-digit normalized mobile number.
      phone_encrypted:
        type: text
        nullable: true
        description: PII — encrypted at rest.
      phone_last_four:
        type: varchar(4)
        nullable: true
      pan_hash:
        type: varchar(64)
        nullable: true
        description: SHA-256 of the uppercase PAN.
      pan_encrypted:
        type: text
        nullable: true
        description: PII — encrypted at rest.
      pan_masked:
        type: varchar(10)
        nullable: true
      aadhaar_hash:
        type: varchar(64)
        nullable: true
        description: SHA-256 of the 12-digit normalized Aadhaar number.
      aadhaar_last_four:
        type: varchar(4)
        nullable: true
      gstin:
        type: varchar(15)
        nullable: true
      created_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      updated_at:
        type: timestamp with time zone
        nullable: false
        default: now()
    indexes:
      - columns: [email]
        unique: true
      - columns: [phone_hash]
      - columns: [aadhaar_hash]
      - columns: [pan_hash]
      - columns: [gstin]
    constraints:
      - expression: "email ~ '^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$'"
      - expression: "gstin IS NULL OR gstin ~ '^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][1-9A-Z]Z[0-9A-Z]$'"

  loan_applications:
    description: |
      Mutable draft/submission state for a single loan application.
    columns:
      id:
        type: uuid
        primary: true
        default: gen_random_uuid()
      borrower_id:
        type: uuid
        nullable: false
        references:
          table: borrowers
          column: id
          on_delete: CASCADE
      requested_amount:
        type: decimal(19,4)
        nullable: true
      purpose:
        type: loan_purpose
        nullable: true
      referral_code:
        type: varchar(20)
        nullable: true
      current_step:
        type: application_step
        nullable: false
        default: "basic_details"
      status:
        type: application_status
        nullable: false
        default: "draft"
      reference_number:
        type: varchar(32)
        nullable: true
        unique: true
      submitted_at:
        type: timestamp with time zone
        nullable: true
      created_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      updated_at:
        type: timestamp with time zone
        nullable: false
        default: now()
    indexes:
      - columns: [borrower_id]
      - columns: [status, created_at]
      - columns: [reference_number]
        unique: true
    constraints:
      - expression: "requested_amount IS NULL OR (requested_amount BETWEEN 500000 AND 10000000 AND requested_amount % 10000 = 0)"
      - expression: "referral_code IS NULL OR referral_code ~ '^[A-Za-z0-9_-]+$'"

  ekyc_records:
    description: |
      Aadhaar eKYC verification attempt and result.
    columns:
      id:
        type: uuid
        primary: true
        default: gen_random_uuid()
      application_id:
        type: uuid
        nullable: false
        references:
          table: loan_applications
          column: id
          on_delete: CASCADE
      aadhaar_last_four:
        type: varchar(4)
        nullable: true
      transaction_id:
        type: varchar(255)
        nullable: true
      verified_at:
        type: timestamp with time zone
        nullable: true
      response_payload:
        type: jsonb
        nullable: true
        default: "{}"
      created_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      updated_at:
        type: timestamp with time zone
        nullable: false
        default: now()
    indexes:
      - columns: [application_id]
      - columns: [transaction_id]

  pan_records:
    description: |
      PAN verification and PAN-Aadhaar link status.
    columns:
      id:
        type: uuid
        primary: true
        default: gen_random_uuid()
      application_id:
        type: uuid
        nullable: false
        references:
          table: loan_applications
          column: id
          on_delete: CASCADE
      pan_hash:
        type: varchar(64)
        nullable: true
      pan_encrypted:
        type: text
        nullable: true
        description: PII — encrypted at rest.
      pan_masked:
        type: varchar(10)
        nullable: true
      link_status:
        type: link_status
        nullable: true
      name_match:
        type: boolean
        nullable: true
      verified_at:
        type: timestamp with time zone
        nullable: true
      created_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      updated_at:
        type: timestamp with time zone
        nullable: false
        default: now()
    indexes:
      - columns: [application_id]
      - columns: [pan_hash]

  gstin_records:
    description: |
      GSTIN validation and Perfios-backed return history.
    columns:
      id:
        type: uuid
        primary: true
        default: gen_random_uuid()
      application_id:
        type: uuid
        nullable: false
        references:
          table: loan_applications
          column: id
          on_delete: CASCADE
      gstin:
        type: varchar(15)
        nullable: true
      consent_granted:
        type: boolean
        nullable: false
        default: false
      return_history_payload:
        type: jsonb
        nullable: true
        default: "{}"
      fetched_at:
        type: timestamp with time zone
        nullable: true
      created_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      updated_at:
        type: timestamp with time zone
        nullable: false
        default: now()
    indexes:
      - columns: [application_id]
      - columns: [gstin]
    constraints:
      - expression: "gstin IS NULL OR gstin ~ '^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][1-9A-Z]Z[0-9A-Z]$'"

  bank_statements:
    description: |
      Perfios bank-statement analysis records.
    columns:
      id:
        type: uuid
        primary: true
        default: gen_random_uuid()
      application_id:
        type: uuid
        nullable: false
        references:
          table: loan_applications
          column: id
          on_delete: CASCADE
      bank_name:
        type: varchar(127)
        nullable: true
      account_number_encrypted:
        type: text
        nullable: true
        description: PII — encrypted at rest.
      account_number_last_four:
        type: varchar(4)
        nullable: true
      perfios_transaction_id:
        type: varchar(255)
        nullable: true
      months:
        type: smallint
        nullable: true
      status:
        type: bank_statement_status
        nullable: false
        default: "pending"
      analysis_score:
        type: numeric(5,2)
        nullable: true
      analyzed_at:
        type: timestamp with time zone
        nullable: true
      raw_payload:
        type: jsonb
        nullable: true
        default: "{}"
      created_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      updated_at:
        type: timestamp with time zone
        nullable: false
        default: now()
    indexes:
      - columns: [application_id]
      - columns: [perfios_transaction_id]
      - columns: [status, analyzed_at]
    constraints:
      - expression: "months IS NULL OR months BETWEEN 6 AND 12"

  uploaded_documents:
    description: |
      ITR and Form 26AS (TDS certificate) uploads.
    columns:
      id:
        type: uuid
        primary: true
        default: gen_random_uuid()
      application_id:
        type: uuid
        nullable: false
        references:
          table: loan_applications
          column: id
          on_delete: CASCADE
      document_type:
        type: document_type
        nullable: false
      file_name:
        type: varchar(255)
        nullable: false
      mime_type:
        type: varchar(127)
        nullable: false
      file_size_bytes:
        type: bigint
        nullable: false
      file_path:
        type: text
        nullable: false
        description: Internal encrypted object-store path.
      encryption_key_id:
        type: varchar(255)
        nullable: false
      status:
        type: document_status
        nullable: false
        default: "pending"
      scan_result:
        type: scan_result
        nullable: true
      uploaded_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      created_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      updated_at:
        type: timestamp with time zone
        nullable: false
        default: now()
    indexes:
      - columns: [application_id]
      - columns: [application_id, document_type]
      - columns: [status, updated_at]
    constraints:
      - expression: "mime_type = 'application/pdf'"
      - expression: "file_size_bytes > 0 AND file_size_bytes <= 5242880"

  consents:
    description: |
      Append-only audit trail of explicit borrower consent decisions.
    columns:
      id:
        type: uuid
        primary: true
        default: gen_random_uuid()
      application_id:
        type: uuid
        nullable: false
        references:
          table: loan_applications
          column: id
          on_delete: CASCADE
      step_id:
        type: varchar(64)
        nullable: false
      consent_key:
        type: varchar(127)
        nullable: false
      accepted:
        type: boolean
        nullable: false
      statement_snapshot:
        type: text
        nullable: false
      locale:
        type: varchar(5)
        nullable: false
      client_ip_hash:
        type: varchar(64)
        nullable: false
      user_agent_hash:
        type: varchar(64)
        nullable: true
      recorded_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      created_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      updated_at:
        type: timestamp with time zone
        nullable: false
        default: now()
    indexes:
      - columns: [application_id, consent_key]
      - columns: [application_id, step_id]
      - columns: [recorded_at]

  idempotency_keys:
    description: |
      Cache of mutating request results for idempotent replays.
    columns:
      id:
        type: uuid
        primary: true
        default: gen_random_uuid()
      key_hash:
        type: varchar(64)
        nullable: false
      scope:
        type: varchar(255)
        nullable: false
      request_path:
        type: varchar(255)
        nullable: false
      payload_hash:
        type: varchar(64)
        nullable: false
      response_status:
        type: smallint
        nullable: false
      response_body:
        type: jsonb
        nullable: true
      created_at:
        type: timestamp with time zone
        nullable: false
        default: now()
      expires_at:
        type: timestamp with time zone
        nullable: false
    indexes:
      - columns: [key_hash, scope]
        unique: true
        condition: "expires_at > now()"
      - columns: [expires_at]

# Migration ordering from a clean database:
# 1. Create enums.
# 2. Create borrowers, loan_applications.
# 3. Create ekyc_records, pan_records, gstin_records, bank_statements, uploaded_documents, consents.
# 4. Create idempotency_keys.
# 5. Attach updated_at trigger and verify constraints.
