version: "1.1.0"
domain: apply-portal
source_of_truth: |
  Application-related PostgreSQL schema for the NavDhan /apply loan portal.
  This file is read-only to implementers; any schema change requires a version
  bump and a migration plan.

conventions:
  primary_keys: |
    All tables MUST have a single-column primary key named `id`.
    Core application tables use UUID v4 generated by the application layer.
    Audit/sequence tables may use BIGSERIAL where natural ordering matters.
  timestamps: |
    Every table MUST include `created_at` and `updated_at` with timezone,
    defaulting to `now()` and auto-updated by trigger or application code.
  foreign_keys: |
    Every foreign key MUST declare an explicit `on_delete` policy in this file.
    Core tables cascade on application deletion; audit tables retain history
    unless otherwise noted.
  pii: |
    PII columns are marked with `pii: true`. Full PII values MUST be encrypted
    at rest using envelope encryption (KMS/AES-256-GCM) or stored as one-way
    hashes when only deduplication/lookup is required.
  soft_delete: |
    No soft-delete columns are used in MVP. Deletion follows `on_delete` rules
    and is intended for data-retention jobs only.

enums:
  application_status:
    values: [draft, submitted, declined, expired]
    description: High-level lifecycle status of the application.
  application_step:
    values:
      - loan_intent
      - personal_contact
      - aadhaar_verification
      - pan_verification
      - gst_verification
      - itr_upload
      - bank_statements
      - review_submit
      - submission_result
    description: Wizard step identifiers aligned with apply-contract.yaml.
  loan_purpose:
    values:
      - working_capital
      - machinery
      - inventory
      - business_expansion
      - debt_refinancing
      - other
  document_type:
    values: [itr, bank_statement, gst_return, other]
  document_status:
    values: [pending, uploaded, scanned, failed]
  scan_result:
    values: [clean, infected, unreadable]
    nullable: true
  perfios_status:
    values: [pending, success, failure, partial]
  consent_step:
    values:
      - aadhaar_verification
      - itr_upload
      - bank_statements
      - review_submit
  offer_status:
    values: [eligible, selected, expired, rejected]
  event_type:
    values:
      - draft_created
      - step_transition
      - otp_sent
      - otp_verified
      - otp_failed
      - consent_recorded
      - document_uploaded
      - document_scan_completed
      - perfios_initiated
      - perfios_callback_received
      - application_submitted
      - submission_failed
      - offer_received
      - offer_selected

tables:
  - name: applications
    tag: core
    description: |
      Master record for every loan application started in the /apply portal.
      Stores the loan intent and current wizard progress.
    columns:
      id:
        type: uuid
        primary: true
        description: Application UUID generated by the app layer.
      session_id:
        type: varchar(255)
        nullable: false
        index: true
        description: Encrypted session cookie identifier; hashed for lookup.
      reference_number:
        type: varchar(32)
        nullable: true
        unique: true
        index: true
        description: Human-readable reference generated on submission, e.g. NDH-YYYYMMDD-XXXXXX.
      status:
        type: application_status
        nullable: false
        default: "'draft'"
        index: true
      current_step:
        type: application_step
        nullable: false
        default: "'loan_intent'"
      loan_amount:
        type: decimal(19, 4)
        nullable: true
        check: "loan_amount IS NULL OR (loan_amount BETWEEN 500000.0000 AND 10000000.0000 AND loan_amount % 10000 = 0)"
      tenure_months:
        type: smallint
        nullable: true
        check: "tenure_months IS NULL OR tenure_months BETWEEN 3 AND 12"
      purpose:
        type: loan_purpose
        nullable: true
      referral_code:
        type: varchar(20)
        nullable: true
        check: "referral_code IS NULL OR referral_code ~ '^[A-Za-z0-9_-]+$'"
      gstin_skipped:
        type: boolean
        nullable: false
        default: "false"
      perfios_transaction_id:
        type: varchar(255)
        nullable: true
        index: true
      submitted_at:
        type: timestamptz
        nullable: true
        index: true
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
      updated_at:
        type: timestamptz
        nullable: false
        default: "now()"
    indexes:
      - name: idx_applications_session_id
        columns: [session_id]
      - name: idx_applications_reference_number
        columns: [reference_number]
        unique: true
      - name: idx_applications_status_created
        columns: [status, created_at]
    foreign_keys: []

  - name: applicants
    tag: core
    description: |
      Borrower identity and contact information. One applicant row per application
      in the borrower-only MVP.
    columns:
      id:
        type: uuid
        primary: true
      application_id:
        type: uuid
        nullable: false
        unique: true
        foreign_key:
          references: applications(id)
          on_delete: CASCADE
      pii_key_id:
        type: varchar(255)
        nullable: false
        default: "'v1'"
        description: Data-encryption key version for all encrypted columns in this row. Enables key rotation without re-encrypting every row.
      full_name:
        type: text
        nullable: true
        pii: true
        description: Encrypted at rest.
      mobile_number_hash:
        type: varchar(64)
        nullable: true
        index: true
        description: SHA-256 hash of normalized 10-digit mobile for deduplication/lookup.
      mobile_number_encrypted:
        type: text
        nullable: true
        pii: true
        description: Ciphertext of full mobile number.
      mobile_number_last_four:
        type: varchar(4)
        nullable: true
        description: Used for masked display in summaries.
      email_hash:
        type: varchar(64)
        nullable: true
        index: true
        description: SHA-256 hash of lower-cased email for deduplication/lookup.
      email_encrypted:
        type: text
        nullable: true
        pii: true
        description: Ciphertext of full email address.
      business_pin_code:
        type: varchar(6)
        nullable: true
        check: "business_pin_code IS NULL OR business_pin_code ~ '^[1-9][0-9]{5}$'"
      aadhaar_hash:
        type: varchar(64)
        nullable: true
        index: true
        description: SHA-256 hash of 12-digit Aadhaar. Full Aadhaar is never persisted.
      aadhaar_last_four:
        type: varchar(4)
        nullable: true
      aadhaar_verified:
        type: boolean
        nullable: false
        default: "false"
      aadhaar_verified_at:
        type: timestamptz
        nullable: true
      pan_hash:
        type: varchar(64)
        nullable: true
        index: true
        description: SHA-256 hash of upper-case PAN. Full PAN is encrypted separately.
      pan_encrypted:
        type: text
        nullable: true
        pii: true
      pan_masked:
        type: varchar(10)
        nullable: true
      pan_verified:
        type: boolean
        nullable: false
        default: "false"
      pan_verified_at:
        type: timestamptz
        nullable: true
      gstin:
        type: varchar(15)
        nullable: true
        check: "gstin IS NULL OR gstin ~ '^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z][1-9A-Z]Z[0-9A-Z]$'"
        index: true
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
      updated_at:
        type: timestamptz
        nullable: false
        default: "now()"
    indexes:
      - name: idx_applicants_application_id
        columns: [application_id]
        unique: true
      - name: idx_applicants_mobile_hash
        columns: [mobile_number_hash]
      - name: idx_applicants_email_hash
        columns: [email_hash]
      - name: idx_applicants_aadhaar_hash
        columns: [aadhaar_hash]
      - name: idx_applicants_pan_hash
        columns: [pan_hash]
      - name: idx_applicants_gstin
        columns: [gstin]

  - name: documents
    tag: core
    description: |
      Metadata and storage references for every file uploaded during the application.
      The actual bytes live in an encrypted private object store bucket.
    columns:
      id:
        type: uuid
        primary: true
      application_id:
        type: uuid
        nullable: false
        foreign_key:
          references: applications(id)
          on_delete: CASCADE
      document_type:
        type: document_type
        nullable: false
      file_name:
        type: varchar(255)
        nullable: false
      mime_type:
        type: varchar(127)
        nullable: false
        check: "mime_type = 'application/pdf'"
      storage_path:
        type: text
        nullable: false
        description: Internal object-store path; never returned to client.
      encryption_key_id:
        type: varchar(255)
        nullable: false
        description: Reference to the data-encryption key used for envelope encryption.
      file_size_bytes:
        type: bigint
        nullable: false
        check: "file_size_bytes > 0 AND file_size_bytes <= 5242880"
      status:
        type: document_status
        nullable: false
        default: "'pending'"
      scan_result:
        type: scan_result
        nullable: true
      financial_year:
        type: varchar(7)
        nullable: true
        description: e.g. "2024-25". Required for ITR and GST return documents.
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
      updated_at:
        type: timestamptz
        nullable: false
        default: "now()"
    indexes:
      - name: idx_documents_application_id
        columns: [application_id]
      - name: idx_documents_application_type
        columns: [application_id, document_type]
      - name: idx_documents_status
        columns: [status, updated_at]

  - name: consents
    tag: core
    description: |
      Append-only audit trail of every explicit consent action in the application.
      Each row stores the exact statement shown to the user at the moment of consent.
    columns:
      id:
        type: uuid
        primary: true
      application_id:
        type: uuid
        nullable: false
        foreign_key:
          references: applications(id)
          on_delete: CASCADE
      step_id:
        type: consent_step
        nullable: false
      consent_key:
        type: varchar(127)
        nullable: false
        description: Stable i18n key for the consent statement.
      accepted:
        type: boolean
        nullable: false
      statement_snapshot:
        type: text
        nullable: false
        description: The exact localized consent text shown to the user.
      locale:
        type: varchar(5)
        nullable: false
        description: One of en, hi, bn, te, mr, ta, kn, ml.
      client_ip_hash:
        type: varchar(64)
        nullable: false
        description: SHA-256 of client IP; raw IP is not stored with consent.
      user_agent_hash:
        type: varchar(64)
        nullable: true
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
      updated_at:
        type: timestamptz
        nullable: false
        default: "now()"
    indexes:
      - name: idx_consents_application_key
        columns: [application_id, consent_key]
      - name: idx_consents_application_step
        columns: [application_id, step_id]
      - name: idx_consents_created
        columns: [created_at]

  - name: lender_offers
    tag: core
    description: |
      Stub table for lender offers matched to a submitted application. In the
      redesign factory offers are generated by a mock matching engine.
    columns:
      id:
        type: uuid
        primary: true
      application_id:
        type: uuid
        nullable: false
        foreign_key:
          references: applications(id)
          on_delete: CASCADE
      lender_name:
        type: varchar(127)
        nullable: false
      lender_logo_url:
        type: text
        nullable: true
        description: Public CDN URL; validated by server before storing.
      loan_amount:
        type: decimal(19, 4)
        nullable: false
        check: "loan_amount > 0"
      interest_rate_annual:
        type: decimal(5, 2)
        nullable: false
        check: "interest_rate_annual > 0"
      tenure_months:
        type: smallint
        nullable: false
        check: "tenure_months BETWEEN 3 AND 12"
      emi_amount:
        type: decimal(19, 4)
        nullable: false
      total_interest:
        type: decimal(19, 4)
        nullable: false
      processing_fee:
        type: decimal(19, 4)
        nullable: false
        default: 0
      net_disbursal:
        type: decimal(19, 4)
        nullable: false
      status:
        type: offer_status
        nullable: false
        default: "'eligible'"
        index: true
      expires_at:
        type: timestamptz
        nullable: true
      selected_at:
        type: timestamptz
        nullable: true
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
      updated_at:
        type: timestamptz
        nullable: false
        default: "now()"
    indexes:
      - name: idx_lender_offers_application_id
        columns: [application_id]
      - name: idx_lender_offers_status
        columns: [status, expires_at]
      - name: idx_lender_offers_application_status
        columns: [application_id, status]
        unique: true
        where: "status = 'selected'"
        description: Only one selected offer per application.

  - name: application_events
    tag: audit
    description: |
      Immutable event log for the application state machine. Used for debugging,
      compliance, and reconstructing user journey timing.
    columns:
      id:
        type: bigserial
        primary: true
      application_id:
        type: uuid
        nullable: false
        foreign_key:
          references: applications(id)
          on_delete: CASCADE
      event_type:
        type: event_type
        nullable: false
      step_id:
        type: application_step
        nullable: true
      metadata:
        type: jsonb
        nullable: false
        default: "'{}'"
        description: Non-PII contextual payload; never store raw PII or full documents here.
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
    indexes:
      - name: idx_application_events_application_id
        columns: [application_id, created_at]
      - name: idx_application_events_type
        columns: [event_type, created_at]
    partition_hint: |
      Consider monthly range partitioning on created_at once event volume exceeds
      10M rows per month.

  - name: otp_attempts
    tag: security
    description: |
      Tracks mock OTP lifecycle for rate limiting, audit, and anti-abuse. The
      destination value itself is hashed; full mobile/Aadhaar is never retained.
    columns:
      id:
        type: uuid
        primary: true
      application_id:
        type: uuid
        nullable: false
        foreign_key:
          references: applications(id)
          on_delete: CASCADE
      channel:
        type: varchar(16)
        nullable: false
        check: "channel IN ('sms', 'aadhaar')"
      destination_hash:
        type: varchar(64)
        nullable: false
        description: SHA-256 of normalized destination.
      otp_reference_id:
        type: varchar(64)
        nullable: false
        unique: true
      purpose:
        type: varchar(32)
        nullable: false
      expires_at:
        type: timestamptz
        nullable: false
      verified:
        type: boolean
        nullable: false
        default: "false"
      attempt_count:
        type: smallint
        nullable: false
        default: 0
        check: "attempt_count >= 0 AND attempt_count <= 3"
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
      updated_at:
        type: timestamptz
        nullable: false
        default: "now()"
    indexes:
      - name: idx_otp_attempts_reference
        columns: [otp_reference_id]
        unique: true
      - name: idx_otp_attempts_destination
        columns: [destination_hash, created_at]
      - name: idx_otp_attempts_application
        columns: [application_id, created_at]

  - name: idempotency_keys
    tag: security
    description: |
      Stores replay-protected idempotency keys scoped to a session. Mutating
      apply-portal endpoints read this table before executing business logic.
      Rows are TTL-purged after the configured window (default 10 minutes).
    columns:
      id:
        type: uuid
        primary: true
      key_hash:
        type: varchar(64)
        nullable: false
        description: SHA-256 hash of the concatenation "scope:key" so raw keys are not retained.
      scope:
        type: varchar(255)
        nullable: false
        description: session identifier (hashed) or webhook sender id.
      request_path:
        type: varchar(255)
        nullable: false
      payload_hash:
        type: varchar(64)
        nullable: false
        description: SHA-256 hash of the request body used to detect replay-with-different-payload.
      response_status:
        type: smallint
        nullable: false
      response_body:
        type: jsonb
        nullable: true
        description: Cached JSON response body for exact replays.
      created_at:
        type: timestamptz
        nullable: false
        default: "now()"
      expires_at:
        type: timestamptz
        nullable: false
    indexes:
      - name: idx_idempotency_keys_lookup
        columns: [key_hash, scope]
        unique: true
        description: Unique composite for O(1) idempotency lookups. Use a partial unique index where expires_at > now() to allow stale rows to expire naturally.
      - name: idx_idempotency_keys_expires
        columns: [expires_at]
        description: Used by the TTL purge job.

migration_notes:
  status: new_schema
  assumptions: |
    This schema is introduced as part of the NavDhan.app redesign factory and is
    assumed to be deployed against a fresh PostgreSQL database or alongside a
    one-time ETL from the legacy NavDhan application system.
  migration_plan:
    - step: 001_create_extensions
      description: |
        Enable `pgcrypto` (for gen_random_uuid) and `uuid-ossp` if not already
        enabled. Create `application_status`, `application_step`, `loan_purpose`,
        `document_type`, `document_status`, `scan_result`, `perfios_status`,
        `consent_step`, `offer_status`, and `event_type` enums.
    - step: 002_create_core_tables
      description: |
        Create `applications`, `applicants`, `documents`, `consents`, and
        `lender_offers` tables with indexes and foreign keys. All monetary
        columns use `decimal(19,4)`. `applicants` includes `pii_key_id`.
    - step: 003_create_audit_and_security_tables
      description: |
        Create `application_events`, `otp_attempts`, and `idempotency_keys`
        tables.
    - step: 004_create_updated_at_trigger
      description: |
        Add an `updated_at` trigger function and attach triggers to all tables
        that require auto-updated timestamps, or rely on application-level
        `updated_at` updates explicitly documented in the repository.
    - step: 004b_idempotency_ttl_job
      description: |
        Schedule a periodic job (pg_cron or application worker) to delete rows
        from `idempotency_keys` where `expires_at <= now()`.
    - step: 005_data_migration_from_legacy
      description: |
        If migrating from a legacy NavDhan schema, map legacy application rows
        to `applications`, extract PII into `applicants` with encryption,
        migrate document references into `documents`, and record retroactive
        consent rows with a fallback statement snapshot in English (`en`).
      rollback: |
        Legacy tables remain untouched until the redesign is verified in
        production; rollback is performed by switching the application to read
        from legacy tables.
    - step: 006_verify_constraints
      description: |
        Run a validation query to confirm no orphaned foreign keys and that all
        `reference_number` values are unique after legacy migration.
  breaking_changes: |
    v1.1.0 changes monetary columns from `bigint` to `decimal(19,4)`, adds the
    `idempotency_keys` table, and adds `applicants.pii_key_id`. Migration from
    v1.0.0 requires casting existing money values and adding the new columns/tables.
    Any subsequent change that renames columns, removes enums, or tightens
    constraints after first deploy MUST be released as v1.2.0+ with a migration
    script and a corresponding update to `apply-contract.yaml`.

pii_inventory:
  - table: applicants
    column: full_name
    handling: encrypted_at_rest
  - table: applicants
    column: mobile_number_encrypted
    handling: encrypted_at_rest
  - table: applicants
    column: email_encrypted
    handling: encrypted_at_rest
  - table: applicants
    column: aadhaar_hash
    handling: one_way_hash
  - table: applicants
    column: pan_encrypted
    handling: encrypted_at_rest
  - table: applicants
    column: gstin
    handling: plain_text_regulatory_required
  - table: documents
    column: storage_path
    handling: internal_reference_encrypted_object
