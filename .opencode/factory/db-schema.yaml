version: "1.0.0"
service: navdhan-www
note: |
  This is a static frontend-only rebuild. No persistent application database is
  used. The documents below are the "static database": JSON and TypeScript files
  that hold structured data, indexed by locale or shared across locales. Treat
  them as source-of-truth schemas for the frontend implementation.

locales:
  supported: [en, hi, bn, te, mr, ta, kn, ml]
  default: en
  fallback: |
    Legal and message content falls back from `currentLocale` to `en` when a file
    is missing or invalid. Marketing arrays fall back to the default locale
    message values through deep merge.

staticDocuments:
  # ---------------------------------------------------------------------------
  # 1. team.json — People data for the `/team` page
  # ---------------------------------------------------------------------------
  team.json:
    path: src/lib/data/team.json
    description: |
      Structured people registry. Static strings (pageHeadingKey, etc.) are kept
      as string values for now but SHOULD be migrated into `messages/<locale>.json`
      under the `team.*` namespace once non-English team copy is required.
    schema:
      pageHeadingKey:
        type: string
        required: true
      pageSubtextKey:
        type: string
        required: true
      joinCtaKey:
        type: string
        required: true
      joinHref:
        type: string
        required: true
        format: uri-reference
      members:
        type: array
        required: true
        itemType:
          type: object
          properties:
            id:
              type: string
              required: true
              description: Stable identifier, URL-safe.
            name:
              type: string
              required: true
            roleKey:
              type: string
              required: true
              description: Role text; currently static, i18n migration pending.
            bioKey:
              type: string
              required: true
              description: Bio text; currently static, i18n migration pending.
            imageAsset:
              type: string
              description: Public asset path. Must exist in `public/`.
            linkedIn:
              type: string
              format: uri
      advisors:
        type: array
        required: true
        itemType:
          type: object
          properties:
            id:
              type: string
              required: true
            name:
              type: string
              required: true
            domainKey:
              type: string
              required: true
              description: Advisor domain; currently static, i18n migration pending.
            contributionKey:
              type: string
              required: true
              description: Contribution text; currently static, i18n migration pending.
            imageAsset:
              type: string
              description: Public asset path. Must exist in `public/`.
            linkedIn:
              type: string
              format: uri

  # ---------------------------------------------------------------------------
  # 2. siteData.ts — Shared marketing domain data (copy-light)
  # ---------------------------------------------------------------------------
  siteData.ts:
    path: src/lib/data/siteData.ts
    description: |
      TypeScript module exporting asset registries and default values. After the
      homepage refactor, this file MUST only export:
        * asset registries with no displayed copy
        * numeric defaults for the EMI calculator
        * trust badges not already handled by messages
      Heading/body strings are not allowed here.
    exports:
      associationBadges:
        type: array
        required: false
        itemType: BadgeItem
      techPartners:
        type: array
        required: false
        itemType: PartnerItem
      loanProducts:
        type: array
        required: false
        itemType: ProductCard
        note: Superceded by `home.loanProducts.products` in messages.
      whyReasons:
        type: array
        required: false
        itemType: ReasonBlock
        note: Superceded by `home.whyNavDhan.reasons` in messages.
      recognitionItems:
        type: array
        required: false
        itemType: RecognitionItem
      customerStories:
        type: array
        required: false
        itemType: StoryCard
      emiDefaults:
        $ref: "#/emiDefaults"
      trustBadges:
        type: array
        required: false
        itemType: string
        note: Superceded by `home.whyNavDhan.trustBadges` in messages.
      teamMembers:
        type: array
        required: false
        itemType: TeamMember
        note: Superceded by `team.json`.
      advisors:
        type: array
        required: false
        itemType: Advisor
        note: Superceded by `team.json`.

    # Reusable item schemas
    itemSchemas:
      BadgeItem:
        type: object
        properties:
          name:
            type: string
            required: true
          logoAsset:
            type: string
            required: true
            description: Public asset path under `public/`.
          href:
            type: string
            format: uri-reference
          altKey:
            type: string
            required: true
            description: Dot-separated key resolved via translator.

      PartnerItem:
        type: object
        properties:
          name:
            type: string
            required: true
          logoAsset:
            type: string
            required: true
          href:
            type: string
            format: uri-reference
          altKey:
            type: string
            required: true

      ProductCard:
        type: object
        properties:
          id:
            type: string
            required: true
          titleKey:
            type: string
            required: true
            description: Localized title key or inline string.
          descriptionKey:
            type: string
            required: true
          iconName:
            type: string
            required: true
            description: Name of a lucide-react icon export.
          href:
            type: string
            format: uri-reference
          ctaKey:
            type: string
            required: true

      ReasonBlock:
        type: object
        properties:
          id:
            type: string
            required: true
          titleKey:
            type: string
            required: true
          bodyKey:
            type: string
            required: true

      RecognitionItem:
        type: object
        properties:
          id:
            type: string
            required: true
          titleKey:
            type: string
            required: true
          descriptionKey:
            type: string
            required: true
          writeUp:
            type: string
            required: true
            description: Long-form modal content; currently static.
          imageAsset:
            type: string
            description: Primary event photo path.
          galleryAssets:
            type: array
            itemType: string
            description: Additional event photos.
          date:
            type: string
            description: Year or ISO date.

      StoryCard:
        type: object
        properties:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          roleKey:
            type: string
            required: true
          questionKey:
            type: string
            required: true
          outcomeKey:
            type: string
            required: true
          imageAsset:
            type: string
            required: true
            description: Customer photo; must be a real opt-in photo per DESIGN.md.

      TeamMember:
        type: object
        properties:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          roleKey:
            type: string
            required: true
          bioKey:
            type: string
            required: true
          imageAsset:
            type: string
          linkedIn:
            type: string
            format: uri

      Advisor:
        type: object
        properties:
          id:
            type: string
            required: true
          name:
            type: string
            required: true
          domainKey:
            type: string
            required: true
          contributionKey:
            type: string
            required: true
          imageAsset:
            type: string
          linkedIn:
            type: string
            format: uri

  # ---------------------------------------------------------------------------
  # 3. legal/**/*.json — Localized legal page documents
  # ---------------------------------------------------------------------------
  legalPages:
    path: content/legal/<locale>/<slug>.json
    supportedSlugs:
      - privacy-policy
      - terms-of-use
      - fair-practices-code
      - cookie-policy
      - grievance-redressal
      - rbi-dlg-disclosure
      - consent-policy
    slugsRule: |
      Slugs are mirrored by `src/lib/legal/loader.ts`. Each slug MUST have an
      English document and MAY have translated documents under `bn/`, `hi/`, etc.
      Missing translations fall back to `content/legal/en/<slug>.json`.
    schema:
      meta:
        type: object
        required: true
        properties:
          title: { type: string, required: true }
          description: { type: string, required: true }
      lastUpdated:
        type: string
        required: true
        format: date
      company:
        type: object
        required: true
        properties:
          name: { type: string, required: true }
          legalName: { type: string, required: true }
          cin: { type: string, required: true }
          address: { type: string, required: true }
          email: { type: string, required: true, format: email }
          phone: { type: string, required: true }
          website: { type: string, required: true, format: uri }
      intro:
        type: object
        required: true
        properties:
          heading: { type: string, required: true }
          body: { type: string, required: true }
      sections:
        type: array
        required: true
        itemType:
          type: object
          properties:
            id:
              type: string
              required: true
            title:
              type: string
              required: true
            content_type:
              type: string
              required: true
              enum: [prose, list]
            body:
              type: string
              description: Required when content_type == prose.
            items:
              type: array
              itemType:
                type: object
                properties:
                  heading: { type: string, required: true }
                  body: { type: string, required: true }
              description: Required when content_type == list.

  # ---------------------------------------------------------------------------
  # 4. company.json — Shared company metadata
  # ---------------------------------------------------------------------------
  company.json:
    path: content/company.json
    description: |
      Single source of truth for legal entity metadata reused by footer, legal
      pages, and structured data.
    schema:
      name: { type: string, required: true }
      legalName: { type: string, required: true }
      cin: { type: string, required: true }
      address: { type: string, required: true }
      email: { type: string, required: true, format: email }
      contactEmails:
        type: object
        required: true
        additionalProperties: { type: string, format: email }
        properties:
          loan: { type: string, required: true }
          partnership: { type: string, required: true }
          support: { type: string, required: true }
          careers: { type: string, required: true }
          press: { type: string, required: true }
          outreach: { type: string, required: true }
      phone: { type: string, required: true }
      website: { type: string, required: true, format: uri }
      tagline: { type: string, required: true }
      parentCompany: { type: string, required: true }
      rbi:
        type: object
        properties:
          note:
            type: string
            description: |
              Lender-facing disclosure allowed only in legal/RBI-DLG contexts,
              never on marketing surfaces.

emiDefaults:
  type: object
  required: true
  properties:
    minAmount: { type: integer, default: 500_000 }
    maxAmount: { type: integer, default: 100_000_000 }
    defaultAmount: { type: integer, default: 2_500_000 }
    minRate: { type: number, default: 12 }
    maxRate: { type: number, default: 24 }
    defaultRate: { type: number, default: 18 }
    minTenure: { type: integer, default: 3 }
    maxTenure: { type: integer, default: 12 }
    defaultTenure: { type: integer, default: 9 }

migrationPlan:
  description: |
    Move marketing-copy strings out of TypeScript modules and into locale JSON.
    No runtime migration is required because these are static files committed to
    the repository.
  steps:
    - id: 1
      action: Move `home.loanProducts.products` from siteData.ts into `home.loanProducts.products` in each locale JSON.
      owner: frontend
    - id: 2
      action: Move `whyReasons` from siteData.ts into `home.whyNavDhan.reasons` in each locale JSON.
      owner: frontend
    - id: 3
      action: Ensure `home.whyNavDhan.trustBadges` exists in every locale JSON.
      owner: frontend
    - id: 4
      action: Refactor Homepage to stop importing arrays from siteData.ts; keep only asset registries and `emiDefaults`.
      owner: frontend
    - id: 5
      action: Add `apply.*` namespace to locale JSON for localized apply form copy.
      owner: frontend
    - id: 6
      action: Load Inter (sans) and Instrument Serif (display) via Next.js font mechanism and wire CSS variables.
      owner: frontend
    - id: 7
      action: Verify `t()` joins arrays with " · " for footer badges, trust badges, and any new list fields.
      owner: test-engineer

indexes:
  - description: |
      Not applicable for static JSON files. Implementers should validate that
      all referenced image/logo assets exist at build time using Next.js static
      analysis or a small pre-build asset inventory check.
