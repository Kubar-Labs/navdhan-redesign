content_writing_guidelines:
  - "Use warm, accessible English. Avoid jargon such as 'embedded lending', 'marketplace', 'BRE', 'leads'."
  - "Legal English must remain plain and enforceable; do not write the final legal prose here."
  - "Each section heading must be approved by compliance before copywriting begins."
  - "Hinglish accents are reserved for marketing pages; legal pages must be precise and clear."
  - "Cross-link labels must match footer labels to avoid duplicate translation keys."

migrations_and_versioning:
  - "Bump minor version for new sections or route changes."
  - "Bump patch version for wording, last-updated date, or contact detail changes."
  - "Major version bump reserved for new regulatory framework or site restructuring."
