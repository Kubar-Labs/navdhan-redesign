    - en
    - hi
    - bn
    - te
    - mr
    - ta
    - kn
    - ml
  default_locale: en
  translate_by_default:
    - page_meta.title
    - page_meta.description
    - section_headings
    - body_copy
    - summaries
    - list_items
    - navigation_labels
    - cta_labels
  english_only_by_default:
    - shared_company_details.legal_name
    - shared_company_details.cin
    - regulatory_citations
    - lender_partner_names
    - technology_provider_names
    - statutory_definitions_when_exact_wording_required
  notes:
    - Hindi and other locale translations require a native-speaker legal review pass before publication.
    - Where RBI, MCA, or FACE mandates exact English wording, the English copy must be displayed alongside the localized summary, not replaced.

global_shell:
  reuse: true
  components:
    - global_header
    - global_footer
  notes:
    - Legal pages must inherit the same sticky header, language toggle, and footer used on marketing pages.
